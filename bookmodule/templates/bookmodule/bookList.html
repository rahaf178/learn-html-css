{% extends "layouts/base.html" %}
{% load static %}

{% block title %} Book List {% endblock %}

{% block content %}
<h2>Book List</h2>
<ul>
    {% for book in books %}
    <li>
        <strong>{{ book.title }}</strong> by {{ book.author }}
    </li>
    {% empty %}
    <li>No books found.</li>
    {% endfor %}
</ul>
{% endblock %}
